name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The orval client (src/api/generated/) is gitignored, so it does not exist
      # in a fresh checkout. Generate it from the committed openapi.json snapshot
      # (in-process, no server) before typecheck/test/lint — otherwise every
      # @api/generated import is missing and typecheck fails with cascading errors.
      - name: Generate API client
        run: bun run codegen

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint
